name: GitHub Pages

on:
  push:
    branches: [master]
    paths-ignore:
      - ".github/**"
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      code: ${{ steps.filter.outputs.code }}
      search: ${{ steps.filter.outputs.search }}
    steps:
      - uses: actions/checkout@v4
        with:
          filter: blob:none
          sparse-checkout: .github
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/!((_posts|_philosophy)/**)/**'
              - 'vite.config.ts'
              - 'scripts/**'
              - 'tools/sitegen/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tests/**'
              - 'playwright.config.*'
            search:
              - 'src/_posts/**'
              - 'src/_philosophy/**'
              - 'tools/search/**'
              - 'tools/pyproject.toml'
              - 'tools/uv.lock'

  quality:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      always() && (
        github.event_name != 'push' ||
        needs.detect-changes.outputs.code == 'true'
      )
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.6.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.13"
          cache: "pnpm"

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Check portable filenames
        run: pnpm run files:check

      - name: Validate content
        run: pnpm run content:validate

      - name: Check image optimization
        run: pnpm run images:check

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test:ci

  search-index:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      always() && (
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        (needs.detect-changes.result == 'success' && needs.detect-changes.outputs.search == 'true')
      )
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore search index cache
        uses: actions/cache@v4
        with:
          path: |
            public/output
            public/philosophy-output
            tools/search/output
            tools/search/output-philosophy
          key: search-${{ runner.os }}-${{ hashFiles('tools/search/main.py', 'tools/pyproject.toml') }}
          restore-keys: |
            search-${{ runner.os }}-

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync
        working-directory: tools

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: hf-model-${{ runner.os }}-all-MiniLM-L6-v2

      - name: Generate search outputs
        run: uv run python search/main.py generate
        working-directory: tools

      - name: Upload search outputs
        uses: actions/upload-artifact@v4
        with:
          name: search-output
          path: |
            public/output
            public/philosophy-output

  mastodon-post:
    runs-on: ubuntu-latest
    needs: [quality, detect-changes]
    if: |
      always() &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') &&
      (needs.quality.result == 'success' || needs.quality.result == 'skipped') &&
      (needs.detect-changes.result == 'success' || needs.detect-changes.result == 'skipped')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync
        working-directory: tools

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create Mastodon discussion for blog article
        env:
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          MASTODON_INSTANCE_URL: ${{ vars.MASTODON_INSTANCE_URL || 'https://mastodon.social' }}
          MASTODON_POST_DATE_TZ: America/Los_Angeles
          MASTODON_WAIT_FOR_POST: "0"
          SOCIAL_POST_CONTENT_KIND: blog
        run: uv run python mastodon/post.py
        working-directory: tools

      - name: Create Mastodon discussion for philosophy essay
        env:
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          MASTODON_INSTANCE_URL: ${{ vars.MASTODON_INSTANCE_URL || 'https://mastodon.social' }}
          MASTODON_POST_DATE_TZ: America/Los_Angeles
          MASTODON_WAIT_FOR_POST: "0"
          SOCIAL_POST_CONTENT_KIND: philosophy
        run: uv run python mastodon/post.py
        working-directory: tools

      - name: Commit Mastodon discussion registry
        run: |
          if git diff --quiet -- src/data/mastodon-discussions.json; then
            echo "No Mastodon registry changes to commit."
          else
            git add src/data/mastodon-discussions.json
            git commit -m "Update Mastodon discussion registry [skip ci]"
            git push origin HEAD:master
          fi

      - name: Upload Mastodon discussion registry
        uses: actions/upload-artifact@v4
        with:
          name: mastodon-discussions
          path: src/data/mastodon-discussions.json

  build-site:
    runs-on: ubuntu-latest
    needs: [quality, search-index, detect-changes, mastodon-post]
    if: |
      always() &&
      (needs.quality.result == 'success' || needs.quality.result == 'skipped') &&
      (needs.search-index.result == 'success' || needs.search-index.result == 'skipped') &&
      (needs.mastodon-post.result == 'success' || needs.mastodon-post.result == 'skipped') &&
      (needs.detect-changes.result == 'success' || needs.detect-changes.result == 'skipped')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Mastodon discussion registry
        if: needs.mastodon-post.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: mastodon-discussions
          path: src/data

      - name: Download search outputs
        if: needs.search-index.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: search-output
          path: public

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.6.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.13"
          cache: "pnpm"

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Check portable filenames
        if: needs.quality.result == 'skipped'
        run: pnpm run files:check

      - name: Validate content
        if: needs.quality.result == 'skipped'
        run: pnpm run content:validate

      - name: Check image optimization
        if: needs.quality.result == 'skipped'
        run: pnpm run images:check

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/sitegen

      - name: Restore site build cache
        uses: actions/cache@v4
        with:
          path: out
          key: site-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'tools/sitegen/Cargo.lock', 'tools/sitegen/src/**', 'src/**', 'vite.config.ts', 'scripts/render-site.mjs') }}
          restore-keys: |
            site-${{ runner.os }}-

      - name: Build site
        env:
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          NEXT_PUBLIC_BUILD_COMMIT: ${{ github.sha }}
          NEXT_PUBLIC_BUILD_TIME: ${{ github.run_id }}
        run: pnpm run build

      - name: Cache Playwright browsers
        if: github.event_name != 'push' || needs.detect-changes.outputs.code == 'true'
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        if: (github.event_name != 'push' || needs.detect-changes.outputs.code == 'true') && steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Run accessibility checks
        if: github.event_name != 'push' || needs.detect-changes.outputs.code == 'true'
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
        run: |
          node scripts/serve-static.mjs out &
          SERVER_PID=$!
          pnpm run e2e:a11y
          kill $SERVER_PID 2>/dev/null || true

      - name: Check artifact filenames
        run: node scripts/check-portable-filenames.mjs out

      - name: Prepare publish artifact
        run: rm -rf out/.site-cache out/.site-manifest.json out/.vite

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-out
          path: out
          compression-level: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build-site
    if: ${{ !cancelled() && needs.build-site.result == 'success' }}
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site-out
          path: out

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./out
          cname: patrickdesjardins.com

  social-post:
    runs-on: ubuntu-latest
    needs: deploy
    if: always() && needs.deploy.result == 'success' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync
        working-directory: tools

      - name: Post new article to LinkedIn
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_ID: ${{ secrets.LINKEDIN_PERSON_ID }}
          SOCIAL_POST_CONTENT_KIND: blog
          LINKEDIN_POST_DATE_TZ: America/Los_Angeles
        run: uv run python linkedin/post.py
        working-directory: tools

      - name: Skip X post until API funding is available
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          SOCIAL_POST_CONTENT_KIND: blog
          TWITTER_POST_DATE_TZ: America/Los_Angeles
        run: uv run python twitter/post.py
        working-directory: tools
