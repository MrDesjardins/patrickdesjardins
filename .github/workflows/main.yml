name: GitHub Pages

on:
  push:
    branches: [master]
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.6.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.13"
          cache: "pnpm"

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Check portable filenames
        run: pnpm run files:check

      - name: Validate content
        run: pnpm run content:validate

      - name: Install image tooling
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Check image optimization
        run: pnpm run images:check

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test:ci

      - name: Check generated site freshness
        run: pnpm run build:check

  search-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true

      - name: Install Python dependencies
        run: uv sync
        working-directory: tools

      - name: Generate search outputs
        run: uv run python search/main.py generate
        working-directory: tools

      - name: Upload search outputs
        uses: actions/upload-artifact@v4
        with:
          name: search-output
          path: |
            public/output
            public/philosophy-output

  verify-site:
    runs-on: ubuntu-latest
    needs: [quality, search-index]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download search outputs
        uses: actions/download-artifact@v4
        with:
          name: search-output
          path: public

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.6.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.13"
          cache: "pnpm"

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Check generated site freshness
        run: pnpm run build:check

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run accessibility checks
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
        run: |
          pnpm run serve &
          pnpm run e2e:a11y

      - name: Check artifact filenames
        run: node scripts/check-portable-filenames.mjs out

  deploy:
    runs-on: ubuntu-latest
    needs: verify-site
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./out
          cname: patrickdesjardins.com

  social-post:
    runs-on: ubuntu-latest
    needs: deploy
    if: success() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true

      - name: Install Python dependencies
        run: uv sync
        working-directory: tools

      - name: Post new article to LinkedIn
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_ID: ${{ secrets.LINKEDIN_PERSON_ID }}
          SOCIAL_POST_CONTENT_KIND: blog
          LINKEDIN_POST_DATE_TZ: America/Los_Angeles
        run: uv run python linkedin/post.py
        working-directory: tools

      - name: Skip X post until API funding is available
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          SOCIAL_POST_CONTENT_KIND: blog
          TWITTER_POST_DATE_TZ: America/Los_Angeles
        run: uv run python twitter/post.py
        working-directory: tools
