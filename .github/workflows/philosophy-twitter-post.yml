name: X philosophy post (manual, disabled)

# Disabled until X API funding is available. This is not a functional failure.

on:
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true

      - name: Install Python dependencies
        run: uv sync
        working-directory: tools

      - name: Skip X philosophy post until API funding is available
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          SOCIAL_POST_CONTENT_KIND: philosophy
          TWITTER_POST_DATE_TZ: America/Los_Angeles
        # The script exits successfully and explains that X posting is disabled
        # because the X API is not funded yet, not because the automation is broken.
        run: uv run python twitter/post.py
        working-directory: tools
